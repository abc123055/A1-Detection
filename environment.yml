name: env_ano
channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ──
  - python=3.8.20

  # ── CUDA / cuDNN (conda-managed, Ampere sm_86 support) ──
  - cudatoolkit=11.2.2
  - cudnn=8.1.0.77

  # ── Core scientific stack ──
  - numpy=1.23.5
  - scipy=1.10.1
  - scikit-learn=1.3.2
  - matplotlib=3.7.5
  - pillow=10.4.0
  - h5py=2.10.0
  - cython=3.0.11

  # ── TF 2.4 base (conda skeleton, overridden by pip nvidia-tensorflow) ──
  - tensorflow=2.4.1
  - tensorflow-base=2.4.1

  # ── Networking / auth (TensorBoard & misc) ──
  - grpcio=1.62.2
  - requests=2.32.3
  - certifi=2024.8.30
  - urllib3=2.2.3

  # ── Build / packaging ──
  - pip=24.3.1
  - setuptools=75.3.0
  - wheel=0.37.1

  # ── pip-managed packages ──
  - pip:
      # NVIDIA TensorFlow 1.15 (includes tf.contrib, CUDA 12 runtime)
      - nvidia-pyindex==1.0.9
      - nvidia-tensorflow==1.15.5+nv23.03

      # NVIDIA CUDA 12 runtime libs (auto-installed by nvidia-tensorflow)
      - nvidia-cublas-cu12==12.9.1.4
      - nvidia-cuda-cupti-cu12==12.9.79
      - nvidia-cuda-nvcc-cu12==12.9.86
      - nvidia-cuda-nvrtc-cu12==12.9.86
      - nvidia-cuda-runtime-cu12==12.9.79
      - nvidia-cudnn-cu12==9.20.0.48
      - nvidia-cufft-cu12==11.4.1.4
      - nvidia-curand-cu12==10.3.10.19
      - nvidia-cusolver-cu12==11.7.5.82
      - nvidia-cusparse-cu12==12.5.10.65
      - nvidia-nccl-cu12==2.29.7
      - nvidia-nvjitlink-cu12==12.9.86

      # NVIDIA DALI (data loading)
      - nvidia-dali-cuda110==1.23.0
      - nvidia-dali-nvtf-plugin==1.23.0+nv23.03

      # TensorRT
      - tensorrt==8.6.1.post1
      - tensorrt-bindings==8.6.1
      - tensorrt-libs==8.6.1

      # TF ecosystem (pinned to 1.15 series by nvidia-tensorflow)
      - tensorboard==1.15.0
      - tensorflow-estimator==1.15.1
      - protobuf==3.20.3
      - gast==0.3.3

      # Vision / plotting
      - opencv-python==4.13.0.92
      - pypng==0.20220715.0
      - matplotlib==3.7.5
      - contourpy==1.1.1
      - cycler==0.12.1
      - fonttools==4.57.0
      - kiwisolver==1.4.7
      - pyparsing==3.1.4
      - pillow==10.4.0
      - python-dateutil==2.9.0.post0
      - importlib-resources==6.4.5

      # ML utilities
      - scikit-learn==1.3.2
      - joblib==1.4.2
      - threadpoolctl==3.5.0
